version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DT-Verwaltung – Docker Swarm Stack
#
# Deploy:
#   docker stack deploy -c docker-compose.yml dtv
#
# Required secret:
#   printf 'ChangeMe!' | docker secret create dtv_admin_password -
#
# Update:
#   docker service update --force dtv_app
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    image: ghcr.io/caps3n/dt-verwaltung:latest
    # When building locally instead of pulling from registry, use:
    # build: .
    ports:
      - target: 5000
        published: ${PORT:-8123}
        protocol: tcp
        mode: host
    volumes:
      - dtv-data:/data
    environment:
      - DATA_DIR=/data
      - ADMIN_PASSWORD_FILE=/run/secrets/dtv_admin_password
    secrets:
      - dtv_admin_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  dtv-data:
    driver: local

secrets:
  dtv_admin_password:
    external: true
